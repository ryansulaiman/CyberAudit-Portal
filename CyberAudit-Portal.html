const uploadScreenshots = async (screenshots, userId) => {
  const result = {};
  for (const [checkId, ss] of Object.entries(screenshots)) {
    if (!ss) continue;
    // Already a remote URL — no upload needed
    if (ss.dataUrl && ss.dataUrl.startsWith('http')) { result[checkId]=ss; continue; }
    // Local data URL — attempt upload to Supabase Storage
    if (ss.dataUrl && ss.dataUrl.startsWith('data:')) {
      try {
        const res=await fetch(ss.dataUrl); const blob=await res.blob();
        const ext=blob.type.split('/')[1]||'png';
        const path=`${userId}/${checkId}_${Date.now()}.${ext}`;
        const {data:upData,error}=await db.storage.from('screenshots').upload(path,blob,{upsert:true});
        if(!error){
          const {data}=db.storage.from('screenshots').getPublicUrl(path);
          result[checkId]={name:ss.name,dataUrl:data.publicUrl};
        } else {
          // Upload failed — keep original data URL so screenshot still displays
          console.warn('Screenshot upload failed, using data URL fallback:',error.message);
          result[checkId]=ss;
        }
      } catch(e){
        // Network/other error — keep original data URL so screenshot still displays
        console.warn('Screenshot upload error, using data URL fallback:',e);
        result[checkId]=ss;
      }
    } else { result[checkId]=ss; }
  }
  return result;
};

function useToast(){
  const [toasts,setToasts]=useState([]);
  const add=useCallback((msg,type="success")=>{ const id=Date.now(); setToasts(p=>[...p,{id,msg,type}]); setTimeout(()=>setToasts(p=>p.filter(t=>t.id!==id)),3500); },[]);
  return {toasts,add};
}
function Toasts({toasts}){
  const cols={success:"#22c55e",error:"#ef4444",info:"#7E05E8",warning:"#f59e0b"};
  return <div style={{position:"fixed",top:16,right:16,zIndex:9999,display:"flex",flexDirection:"column",gap:8,pointerEvents:"none"}}>
    {toasts.map(t=><div key={t.id} className="toast" style={{background:cols[t.type]||cols.info,color:"#fff",padding:"10px 18px",borderRadius:10,fontSize:13,fontWeight:700,boxShadow:"0 4px 16px #0003",maxWidth:320}}>{t.msg}</div>)}

// ── NOTIFICATION BELL ────────────────────────────────────────────────
function NotifBell({th,notifs,onMarkRead,onMarkAll}){
  const [open,setOpen]=useState(false); const ref=useRef();
  const unread=notifs.filter(n=>!n.read).length;
  useEffect(()=>{
    const h=e=>{if(ref.current&&!ref.current.contains(e.target))setOpen(false);};
    document.addEventListener('mousedown',h); return()=>document.removeEventListener('mousedown',h);
  },[]);
  return <div ref={ref} style={{position:"relative"}}>
    <button onClick={()=>setOpen(o=>!o)} style={{background:open?th.accent:th.card,border:`1.5px solid ${open?th.accent:th.border}`,borderRadius:10,padding:"8px 14px",cursor:"pointer",color:open?"#fff":th.text,fontSize:15,position:"relative",transition:"all 0.15s"}}>
      🔔{unread>0&&<span style={{position:"absolute",top:-4,right:-4,background:"#ef4444",color:"#fff",borderRadius:99,padding:"1px 6px",fontSize:10,fontWeight:700}}>{unread}</span>}
    </button>
    {open&&<div style={{position:"absolute",right:0,top:"calc(100% + 8px)",background:th.card,border:`1px solid ${th.border}`,borderRadius:12,boxShadow:"0 8px 24px #0003",width:320,zIndex:300,animation:"fadeIn 0.15s ease"}}>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"12px 16px",borderBottom:`1px solid ${th.border}`}}>
        <div style={{fontWeight:700,fontSize:13,color:th.text}}>🔔 Notifications{unread>0&&` (${unread} new)`}</div>
        {unread>0&&<button onClick={onMarkAll} style={{fontSize:11,color:th.accent,background:"none",border:"none",cursor:"pointer",fontWeight:600}}>Mark all read</button>}
      </div>
      <div style={{maxHeight:300,overflowY:"auto"}}>
        {notifs.length===0&&<div style={{padding:20,textAlign:"center",color:th.sub,fontSize:13}}>No notifications yet</div>}
        {notifs.slice(0,20).map(n=><div key={n.id} onClick={()=>onMarkRead(n.id)} style={{display:"flex",gap:10,padding:"10px 16px",borderBottom:`1px solid ${th.border}`,cursor:"pointer",background:n.read?"transparent":th.accent+"11",alignItems:"flex-start"}}>
          <div style={{width:8,height:8,borderRadius:"50%",background:n.read?th.border:th.accent,flexShrink:0,marginTop:5}}/>

        </div>)}
      </div>
    </div>}
  </div>;
}

    if(locked)return;

            <input value={resetEmail} onChange={e=>setResetEmail(e.target.value)} placeholder="employee@company.com" style={{width:"100%",padding:"10px 12px",borderRadius:8,border:"1.5px solid #e2e8f0",marginBottom:12,fontSize:14,boxSizing:"border-box"}}/>
            {resetMsg&&<div style={{fontSize:13,marginBottom:10,color:resetMsg.startsWith("✅")?"#16a34a":"#dc2626"}}>{resetMsg}</div>}
            {resetLink&&<div style={{background:"#f0fdf4",borderRadius:8,padding:"10px 12px",marginBottom:12}}>
              <div style={{fontSize:11,fontWeight:700,color:"#166534",marginBottom:4}}>Copy & share this link:</div>
              <div style={{fontSize:10,color:"#15803d",wordBreak:"break-all",fontFamily:"monospace",marginBottom:6}}>{resetLink}</div>
              <button onClick={()=>{navigator.clipboard.writeText(resetLink);addToast("Link copied!","success");}} style={{fontSize:11,padding:"4px 10px",borderRadius:6,background:"#22c55e",color:"#fff",border:"none",cursor:"pointer",fontWeight:700}}>📋 Copy Link</button>
            </div>}
            <button onClick={handleReset} style={{width:"100%",background:"#7E05E8",color:"#fff",border:"none",borderRadius:8,padding:10,fontSize:14,fontWeight:700,cursor:"pointer",marginBottom:8}}>Generate Reset Link</button>
            <button onClick={()=>{setResetting(false);setResetMsg("");setResetLink("");}} style={{width:"100%",background:"#f1f5f9",color:"#64748b",border:"none",borderRadius:8,padding:10,fontSize:14,cursor:"pointer"}}>← Back to Login</button>
          </>
        )}
      </div>
    </div>
  );
}

// ── PASSWORD RESET PAGE ───────────────────────────────────────────────
function PasswordResetPage({users,setUsers,addToast,onDone}){
  const [newPass,setNewPass]=useState(""); const [confirm,setConfirm]=useState(""); const [done,setDone]=useState(false); const [err,setErr]=useState("");
  const hash=window.location.hash;
  const token=(hash.match(/[?&]token=([a-f0-9]+)/)||[])[1];
  const now=new Date();
  const user=token?users.find(u=>u.resetToken===token&&u.resetExpiry&&new Date(u.resetExpiry)>now):null;
  const submit=async()=>{
    if(newPass.length<6){setErr("Password must be at least 6 characters.");return;}
    if(newPass!==confirm){setErr("Passwords don't match.");return;}
    try{
      await db.from('users').update({password:newPass,reset_token:null,reset_token_expiry:null}).eq('id',user.id);
      setUsers(prev=>prev.map(u=>u.id===user.id?{...u,password:newPass,resetToken:null,resetExpiry:null}:u));
      setDone(true); addToast("Password updated successfully!","success");
    }catch(e){setErr("Failed to update password.");}
  };
  if(!token||!user) return(
    <div style={{minHeight:"100vh",background:"linear-gradient(135deg,#5400C2,#7E05E8)",display:"flex",alignItems:"center",justifyContent:"center"}}>
      <div style={{background:"#fff",borderRadius:20,padding:40,textAlign:"center",maxWidth:380}}>
        <div style={{fontSize:40}}>⚠️</div>
        <div style={{fontSize:18,fontWeight:800,color:"#7E05E8",marginTop:12}}>Invalid or Expired Link</div>
        <div style={{fontSize:13,color:"#64748b",marginTop:8}}>This reset link is invalid or has expired (1 hour limit). Please request a new one.</div>
        <button onClick={onDone} style={{marginTop:20,background:"#7E05E8",color:"#fff",border:"none",borderRadius:8,padding:"10px 24px",fontSize:14,fontWeight:700,cursor:"pointer"}}>← Back to Login</button>
      </div>
    </div>
  );
  if(done) return(
    <div style={{minHeight:"100vh",background:"linear-gradient(135deg,#5400C2,#7E05E8)",display:"flex",alignItems:"center",justifyContent:"center"}}>
      <div style={{background:"#fff",borderRadius:20,padding:40,textAlign:"center",maxWidth:380}}>
        <div style={{fontSize:48}}>✅</div>
        <div style={{fontSize:18,fontWeight:800,color:"#7E05E8",marginTop:12}}>Password Updated!</div>
        <button onClick={onDone} style={{marginTop:20,background:"#7E05E8",color:"#fff",border:"none",borderRadius:8,padding:"10px 24px",fontSize:14,fontWeight:700,cursor:"pointer"}}>Sign In</button>
      </div>
    </div>
  );
  return(
    <div style={{minHeight:"100vh",background:"linear-gradient(135deg,#5400C2,#7E05E8)",display:"flex",alignItems:"center",justifyContent:"center"}}>
      <div style={{background:"#fff",borderRadius:20,padding:40,width:380,boxShadow:"0 24px 64px #0005"}}>
        <div style={{textAlign:"center",marginBottom:24}}><div style={{fontSize:36}}>🔑</div><div style={{fontSize:20,fontWeight:800,color:"#7E05E8",marginTop:6}}>Set New Password</div><div style={{fontSize:12,color:"#64748b"}}>for {user.name}</div></div>
        <label style={{fontSize:12,fontWeight:600,color:"#374151",display:"block",marginBottom:4}}>New Password</label>
        <input type="password" value={newPass} onChange={e=>setNewPass(e.target.value)} placeholder="Min 6 characters" style={{width:"100%",padding:"10px 12px",borderRadius:8,border:"1.5px solid #e2e8f0",marginBottom:12,fontSize:14,boxSizing:"border-box"}}/>
        <label style={{fontSize:12,fontWeight:600,color:"#374151",display:"block",marginBottom:4}}>Confirm Password</label>
        <input type="password" value={confirm} onChange={e=>setConfirm(e.target.value)} placeholder="Repeat password" onKeyDown={e=>e.key==="Enter"&&submit()} style={{width:"100%",padding:"10px 12px",borderRadius:8,border:"1.5px solid #e2e8f0",marginBottom:14,fontSize:14,boxSizing:"border-box"}}/>
        {err&&<div style={{color:"#ef4444",fontSize:13,marginBottom:10}}>{err}</div>}
        <button onClick={submit} style={{width:"100%",background:"#7E05E8",color:"#fff",border:"none",borderRadius:8,padding:11,fontSize:15,fontWeight:700,cursor:"pointer"}}>Update Password</button>
      </div>
    </div>
  );
}

// ── CHANGE PASSWORD MODAL ─────────────────────────────────────────────
function ChangePasswordModal({user,setUsers,th,onClose,addToast}){
  const [cur,setCur]=useState(""); const [np,setNp]=useState(""); const [cp,setCp]=useState(""); const [err,setErr]=useState("");
  const save=async()=>{
    if(cur!==user.password){setErr("Current password is incorrect.");return;}
    if(np.length<6){setErr("New password must be at least 6 characters.");return;}
    if(np!==cp){setErr("Passwords don't match.");return;}
    try{
      await db.from('users').update({password:np}).eq('id',user.id);
      setUsers(prev=>prev.map(u=>u.id===user.id?{...u,password:np}:u));
      addToast("✅ Password changed successfully!","success"); onClose();
    }catch(e){setErr("Failed to update password.");}
  };
  return <Modal th={th} title="🔑 Change Password" onClose={onClose}>
    {[["Current Password",cur,setCur],["New Password",np,setNp],["Confirm New Password",cp,setCp]].map(([lbl,val,set])=>
      <div key={lbl} style={{marginBottom:14}}><label style={{fontSize:12,fontWeight:600,color:th.sub,display:"block",marginBottom:4}}>{lbl}</label><Inp th={th} type="password" value={val} onChange={e=>set(e.target.value)} placeholder="••••••••"/></div>
    )}
    {err&&<div style={{color:"#ef4444",fontSize:13,marginBottom:12}}>{err}</div>}
    <div style={{display:"flex",gap:10}}><Btn th={th} variant="success" onClick={save}>Update Password</Btn><Btn th={th} variant="ghost" onClick={onClose}>Cancel</Btn></div>
  </Modal>;
}

// ── AUDIT FORM ───────────────────────────────────────────────────────
function AuditForm({user,audits,setAudits,tasks,setTasks,setActivity,setNotifications,admins,onDone,th,addToast}){
  const period=curPeriod();
  const existing=audits.find(a=>a.userId===user.id&&a.period===period);
  const [step,setStep]=useState(0);
  const [device,setDevice]=useState(existing?{deviceType:existing.deviceType,deviceModel:existing.deviceModel,serialNumber:existing.serialNumber,osVersion:existing.osVersion}:{deviceType:"",deviceModel:"",serialNumber:"",osVersion:""});
  const [checks,setChecks]=useState(existing?{...existing.checks}:{});
  const [screenshots,setScreenshots]=useState(existing?.screenshots||{});
  const [submitted,setSubmitted]=useState(false); const [submitting,setSubmitting]=useState(false);
  const fileRefs=useRef({});
  const handleFile=(id,e)=>{const f=e.target.files[0];if(!f)return;const r=new FileReader();r.onload=ev=>setScreenshots(s=>({...s,[id]:{name:f.name,dataUrl:ev.target.result}}));r.readAsDataURL(f);};
  const screenshotMissing=SECURITY_CHECKS.filter(c=>checks[c.id]==="yes"&&!screenshots[c.id]);
  const allChecksAnswered=SECURITY_CHECKS.every(c=>checks[c.id]);
  const canSubmit=allChecksAnswered&&screenshotMissing.length===0;

  const handleSubmit=async()=>{
    setSubmitting(true);
    const finalScreenshots=await uploadScreenshots(screenshots,user.id);
    const ver=existing?(existing.version||1)+1:1;
    const auditId=existing?existing.id:`a${Date.now()}`;
    const audit={id:auditId,userId:user.id,period,version:ver,...device,checks,screenshots:finalScreenshots,submittedAt:new Date().toISOString(),status:"pending_review"};
    const newTasks=SECURITY_CHECKS.filter(c=>checks[c.id]==="no").map(c=>({id:`t${Date.now()}${Math.random()}`,userId:user.id,auditId:audit.id,checkId:c.id,label:c.task,status:"pending",priority:"high",assignedTo:admins[0]?.id||"",createdAt:new Date().toISOString(),comments:[],dueDate:DEADLINE}));
    const actItem={id:`ac${Date.now()}`,userId:user.id,action:"submitted audit",target:periodLbl(period),timestamp:new Date().toISOString()};
    const notifItem={id:`n${Date.now()}`,text:`📋 ${user.name} submitted a ${periodLbl(period)} audit for review`,read:false,time:new Date().toISOString()};
    setAudits(prev=>[...prev.filter(a=>!(a.userId===user.id&&a.period===period)),audit]);
    setTasks(prev=>[...prev.filter(t=>!(t.userId===user.id&&t.auditId===auditId)),...newTasks]);
    setActivity(prev=>[actItem,...prev]);
    admins.forEach(admin=>setNotifications(prev=>({...prev,[admin.id]:[{...notifItem,id:`n${Date.now()}${Math.random()}`},...(prev[admin.id]||[])]})));
    setSubmitted(true); setSubmitting(false);
    try{
      await db.from('audits').upsert(toDbAudit(audit));
      await db.from('tasks').delete().eq('audit_id',auditId);
      if(newTasks.length>0)await db.from('tasks').insert(newTasks.map(toDbTask));
      await db.from('activity').insert(toDbActiv(actItem));
      for(const admin of admins) await db.from('notifications').insert(toDbNotif({...notifItem,id:`n${Date.now()}${Math.random()}`},admin.id));
    }catch(e){console.error('DB:',e);}
  };

  if(submitted)return <div style={{textAlign:"center",padding:60,color:th.text}}><div style={{fontSize:60}}>✅</div><div style={{fontSize:22,fontWeight:800,marginTop:12}}>Audit Submitted!</div><div style={{color:th.sub,marginTop:8}}>Your {periodLbl(period)} audit is under review.</div><Btn th={th} style={{marginTop:24}} onClick={onDone}>← Back to Dashboard</Btn></div>;
  const steps=["Device Info","Security Checks","Review & Submit"];
  const complete0=device.deviceType&&device.deviceModel&&device.osVersion;
  return(
    <div style={{maxWidth:680,margin:"0 auto",padding:"28px 16px",color:th.text}}>
      <div style={{marginBottom:20}}>
        <div style={{fontSize:20,fontWeight:800}}>🛡️ Security Self-Audit — {periodLbl(period)}</div>
        <div style={{fontSize:13,color:th.sub}}>Deadline: {fmt(DEADLINE)} · {Math.max(0,daysLeft(DEADLINE))} days left</div>
        <div style={{display:"flex",gap:6,marginTop:14}}>
          {steps.map((s,i)=><div key={i} onClick={()=>i<step&&setStep(i)} style={{flex:1,padding:"8px 4px",textAlign:"center",borderRadius:8,fontSize:12,fontWeight:700,cursor:i<step?"pointer":"default",background:step===i?th.accent:i<step?"#22c55e":th.border,color:step===i||i<step?"#fff":th.sub}}>{i<step?"✓":i+1}. {s}</div>)}
        </div>
      </div>
      <Card th={th}>
        {step===0&&(<>
          <div style={{fontSize:15,fontWeight:700,marginBottom:16}}>🖥️ Device Information</div>
          {[["Device Type","deviceType",["Mac","Windows","Linux"]],["Device Model","deviceModel"],["Serial Number","serialNumber"],["OS Version","osVersion"]].map(([lbl,key,opts])=>(
            <div key={key} style={{marginBottom:14}}>
              <label style={{fontSize:12,fontWeight:600,color:th.sub,display:"block",marginBottom:4}}>{lbl}{["deviceType","deviceModel","osVersion"].includes(key)&&<span style={{color:"#ef4444"}}> *</span>}</label>
              {opts?<Sel th={th} value={device[key]} onChange={e=>setDevice(d=>({...d,[key]:e.target.value}))}><option value="">Select…</option>{opts.map(o=><option key={o}>{o}</option>)}</Sel>:<Inp th={th} value={device[key]} onChange={e=>setDevice(d=>({...d,[key]:e.target.value}))}/>}
            </div>
          ))}
          <Btn th={th} onClick={()=>setStep(1)} disabled={!complete0}>Next →</Btn>
        </>)}
        {step===1&&(<>
          <div style={{fontSize:15,fontWeight:700,marginBottom:4}}>✅ Security Checks</div>
          <div style={{fontSize:12,color:th.sub,marginBottom:14}}>📸 Screenshot required for every <strong>Yes</strong> answer.</div>
          {SECURITY_CHECKS.map(chk=>{
            const val=checks[chk.id]; const missing=val==="yes"&&!screenshots[chk.id];
            return <div key={chk.id} style={{marginBottom:14,padding:"14px 16px",borderRadius:10,border:`1.5px solid ${missing?"#f59e0b":val==="yes"?"#86efac":val==="no"?"#fca5a5":th.border}`,background:missing?"#fffbeb":val==="yes"?RB.secure:val==="no"?RB.danger:th.input}}>
              <div style={{fontWeight:600,fontSize:13,marginBottom:10}}>{chk.icon} {chk.label}</div>
              <div style={{display:"flex",gap:10,alignItems:"center",flexWrap:"wrap"}}>
                {["yes","no"].map(v=><label key={v} style={{display:"flex",alignItems:"center",gap:6,cursor:"pointer",fontSize:13,fontWeight:600,color:val===v?(v==="yes"?"#16a34a":"#dc2626"):th.sub}}><input type="radio" name={chk.id} value={v} checked={val===v} onChange={()=>setChecks(c=>({...c,[chk.id]:v}))}/>{v==="yes"?"✅ Yes":"❌ No"}</label>)}
                <div style={{marginLeft:"auto",display:"flex",alignItems:"center",gap:8}}>
                  {screenshots[chk.id]?.dataUrl&&<img src={screenshots[chk.id].dataUrl} alt="proof" style={{width:36,height:36,objectFit:"cover",borderRadius:6}}/>}
                  <div><input type="file" accept="image/*" ref={el=>fileRefs.current[chk.id]=el} onChange={e=>handleFile(chk.id,e)} style={{display:"none"}}/>
                  <button onClick={()=>fileRefs.current[chk.id]?.click()} style={{fontSize:11,padding:"5px 10px",borderRadius:6,border:`1.5px solid ${missing?"#f59e0b":th.border}`,background:missing?"#fef3c7":th.card,cursor:"pointer",color:missing?"#92400e":th.sub,fontWeight:missing?700:400}}>{screenshots[chk.id]?"📸 Change":missing?"⚠️ Upload required":"📸 Upload proof"}</button></div>
                </div>
              </div>
              {missing&&<div style={{fontSize:11,color:"#b45309",marginTop:8,fontWeight:600}}>⚠️ Screenshot required for "Yes" answers.</div>}
            </div>;
          })}
          <div style={{display:"flex",gap:10,marginTop:8}}><Btn th={th} variant="ghost" onClick={()=>setStep(0)}>← Back</Btn><Btn th={th} onClick={()=>setStep(2)} disabled={!allChecksAnswered||screenshotMissing.length>0}>{screenshotMissing.length>0?`Missing ${screenshotMissing.length} screenshot(s)`:"Review →"}</Btn></div>
        </>)}
        {step===2&&(<>
          <div style={{fontSize:15,fontWeight:700,marginBottom:16}}>📋 Review & Submit</div>
          <div style={{background:th.input,borderRadius:10,padding:14,marginBottom:16,fontSize:13}}><strong>Device:</strong> {device.deviceType} · {device.deviceModel} · {device.osVersion}</div>
          <div style={{display:"flex",flexDirection:"column",gap:8,marginBottom:18}}>
            {SECURITY_CHECKS.map(c=><div key={c.id} style={{display:"flex",alignItems:"center",justifyContent:"space-between",padding:"10px 14px",borderRadius:8,background:checks[c.id]==="yes"?RB.secure:RB.danger}}><span style={{fontSize:13}}>{checks[c.id]==="yes"?"✅":"❌"} {c.label}</span>{screenshots[c.id]?.dataUrl&&<img src={screenshots[c.id].dataUrl} style={{width:32,height:32,objectFit:"cover",borderRadius:6}}/>}</div>)}
          </div>
          <div style={{background:RB.warning,borderRadius:8,padding:"10px 14px",fontSize:12,color:"#78350f",marginBottom:16}}>⚠️ By submitting, you confirm these details are accurate.</div>
          <div style={{display:"flex",gap:10}}><Btn th={th} variant="ghost" onClick={()=>setStep(1)}>← Back</Btn><Btn th={th} variant="success" onClick={handleSubmit} disabled={!canSubmit||submitting}>{submitting?"⏳ Uploading…":"🚀 Submit Audit"}</Btn></div>
        </>)}
      </Card>
    </div>
  );
}

// ── EMPLOYEE DASHBOARD ────────────────────────────────────────────────
function EmployeeDashboard({user,setUsers,audits,setAudits,tasks,setTasks,setActivity,notifications,setNotifications,admins,th,addToast}){
  const [view,setView]=useState("home"); const [showChangePw,setShowChangePw]=useState(false);

  const myTasks=tasks.filter(t=>t.userId===user.id&&t.status!=="completed");

// ── ADMIN DASHBOARD ───────────────────────────────────────────────────
function AdminDashboard({user,users,setUsers,audits,setAudits,tasks,setTasks,activity,setActivity,notifications,setNotifications,departments,setDepartments,th,addToast}){
  const [tab,setTab]=useState("overview");
  const [search,setSearch]=useState(""); const [filterDept,setFilterDept]=useState("All"); const [filterRisk,setFilterRisk]=useState("All"); const [taskFilter,setTaskFilter]=useState("all");
  const [selectedAudit,setSelectedAudit]=useState(null); const [rejectReason,setRejectReason]=useState(""); const [commentText,setCommentText]=useState({});
  const [empModal,setEmpModal]=useState(null); const [bulkModal,setBulkModal]=useState(false); const [deleteModal,setDeleteModal]=useState(null); const [deptModal,setDeptModal]=useState(false); const [historyUser,setHistoryUser]=useState(null); const [historyLightbox,setHistoryLightbox]=useState(null);
  const [reminderSent,setReminderSent]=useState({});

  const period=curPeriod();
  const employees=users.filter(u=>u.role==="employee");
  const admins=users.filter(u=>u.role==="admin");
  const curAudits=audits.filter(a=>a.period===period);
  const pendingReview=curAudits.filter(a=>a.status==="pending_review").length;

  const markOne=id=>{setNotifications(prev=>({...prev,[user.id]:(prev[user.id]||[]).map(n=>n.id===id?{...n,read:true}:n)}));db.from('notifications').update({read:true}).eq('id',id).then();};
  const markAll=()=>{setNotifications(prev=>({...prev,[user.id]:(prev[user.id]||[]).map(n=>({...n,read:true}))}));db.from('notifications').update({read:true}).eq('user_id',user.id).then();};

  const scoreAll=curAudits.map(a=>scoreAudit(a.checks));
  const avgScore=scoreAll.length?Math.round(scoreAll.reduce((s,x)=>s+x,0)/scoreAll.length):0;
  const fullySecure=curAudits.filter(a=>scoreAudit(a.checks)===100).length;
  const withIssues=curAudits.filter(a=>scoreAudit(a.checks)<100).length;
  const countMissing=id=>curAudits.filter(a=>a.checks[id]==="no").length;
  const trendData=[62,68,71,74,78,avgScore]; const maxT=Math.max(...trendData,1);

  // Dept compliance
  const deptStats=departments.map(d=>{
    const dEmps=employees.filter(u=>u.department===d);
    const dAudits=dEmps.map(u=>curAudits.find(a=>a.userId===u.id&&a.status!=="rejected")).filter(Boolean);
    const avg=dAudits.length?Math.round(dAudits.reduce((s,a)=>s+scoreAudit(a.checks),0)/dAudits.length):null;
    return{dept:d,total:dEmps.length,submitted:dAudits.length,avg};
  }).filter(d=>d.total>0);

  // Leaderboard
  const leaderboard=employees.map(u=>{const a=curAudits.find(x=>x.userId===u.id&&x.status!=="rejected");return{...u,score:a?scoreAudit(a.checks):null};}).filter(u=>u.score!==null).sort((a,b)=>b.score-a.score);
  const needsAttention=employees.filter(u=>!curAudits.find(a=>a.userId===u.id&&a.status!=="rejected"));

  const approveAudit=async a=>{
    const emp=users.find(u=>u.id===a.userId);
    const act={id:`ac${Date.now()}`,userId:user.id,action:"approved audit",target:emp?.name,timestamp:new Date().toISOString()};
    const notif={id:`n${Date.now()}`,text:`✅ Your ${periodLbl(a.period)} audit has been approved!`,read:false,time:new Date().toISOString()};
    setAudits(prev=>prev.map(x=>x.id===a.id?{...x,status:"approved",approvedBy:user.id}:x));
    setActivity(prev=>[act,...prev]); setNotifications(prev=>({...prev,[a.userId]:[notif,...(prev[a.userId]||[])]}));
    setSelectedAudit(null); setRejectReason(""); addToast(`Approved ${emp?.name}'s audit ✅`,"success");
    try{await db.from('audits').update({status:"approved",approved_by:user.id}).eq('id',a.id);await db.from('activity').insert(toDbActiv(act));await db.from('notifications').insert(toDbNotif(notif,a.userId));}catch(e){console.error(e);}
  };
  const rejectAudit=async a=>{
    if(!rejectReason.trim())return;
    const emp=users.find(u=>u.id===a.userId);
    const act={id:`ac${Date.now()}`,userId:user.id,action:"rejected audit",target:emp?.name,timestamp:new Date().toISOString()};
    const notif={id:`n${Date.now()}`,text:`❌ Your ${periodLbl(a.period)} audit was rejected: ${rejectReason}`,read:false,time:new Date().toISOString()};
    setAudits(prev=>prev.map(x=>x.id===a.id?{...x,status:"rejected",rejectedReason:rejectReason}:x));
    setActivity(prev=>[act,...prev]); setNotifications(prev=>({...prev,[a.userId]:[notif,...(prev[a.userId]||[])]}));
    setRejectReason(""); setSelectedAudit(null); addToast(`Rejected ${emp?.name}'s audit`,"warning");
    try{await db.from('audits').update({status:"rejected",rejected_reason:rejectReason}).eq('id',a.id);await db.from('activity').insert(toDbActiv(act));await db.from('notifications').insert(toDbNotif(notif,a.userId));}catch(e){console.error(e);}
  };
  const addComment=async tid=>{

    try{await db.from('tasks').update({comments:upd}).eq('id',tid);}catch(e){console.error(e);}
  };
  const sendReminder=async emp=>{
    const notif={id:`n${Date.now()}`,text:`⚠️ Reminder: Submit your ${periodLbl(period)} security audit before the deadline!`,read:false,time:new Date().toISOString()};
    const act={id:`ac${Date.now()}`,userId:user.id,action:"sent reminder to",target:emp.name,timestamp:new Date().toISOString()};

    setReminderSent(prev=>({...prev,[emp.id]:true})); setTimeout(()=>setReminderSent(prev=>({...prev,[emp.id]:false})),3000);
    addToast(`🔔 Reminder sent to ${emp.name}!`,"success");
    try{await db.from('notifications').insert(toDbNotif(notif,emp.id));await db.from('activity').insert(toDbActiv(act));}catch(e){console.error(e);}

  const filteredTasks=tasks.filter(t=>users.some(u=>u.id===t.userId)&&(taskFilter==="all"||t.status===taskFilter));
  const TABS=[["overview","📊","Overview"],["employees","👥","Employees"],["tasks","📋","Tasks"],["reports","📈","Reports"],["leaderboard","🏆","Leaderboard"],["activity","🕐","Activity"]];

                  <option value="pending">Pending</option><option value="in_progress">In Progress</option><option value="completed">Completed</option>
                </select>

              <div style={{display:"flex",gap:8,marginTop:6}}><input value={commentText[t.id]||""} onChange={e=>setCommentText(p=>({...p,[t.id]:e.target.value}))} placeholder="Add comment…" onKeyDown={e=>e.key==="Enter"&&addComment(t.id)} style={{flex:1,fontSize:12,padding:"5px 10px",borderRadius:6,border:`1px solid ${th.border}`,background:th.input,color:th.text}}/><button onClick={()=>addComment(t.id)} style={{fontSize:12,padding:"5px 12px",borderRadius:6,background:th.accent,color:"#fff",border:"none",cursor:"pointer",fontWeight:700}}>Send</button></div>

          {[["Overall Compliance",`${avgScore}%`,"#7E05E8"],["Submitted",`${curAudits.filter(a=>a.status!=="rejected").length}/${employees.length}`,"#0ea5e9"],["Open Tasks",tasks.filter(t=>t.status!=="completed").length,"#f59e0b"]].map(([lbl,val,col])=><Card key={lbl} th={th} style={{textAlign:"center"}}><div style={{fontSize:26,fontWeight:900,color:col}}>{val}</div><div style={{fontSize:12,color:th.sub}}>{lbl}</div></Card>)}

        <Card th={th} style={{marginBottom:16}}>

            {employees.map(u=>{const a=curAudits.find(x=>x.userId===u.id);const sc=a?scoreAudit(a.checks):null;const risk=sc!==null?riskOf(sc):null;return<div key={u.id} style={{padding:"12px 14px",borderRadius:10,background:risk?RB[risk]:th.input,border:`1.5px solid ${risk?RC[risk]+"44":th.border}`}}><div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}><div><div style={{fontWeight:700,fontSize:13}}>{u.name}</div><div style={{fontSize:11,color:th.sub}}>{u.department}</div></div><div style={{fontSize:20,fontWeight:900,color:risk?RC[risk]:th.sub}}>{sc!==null?`${sc}%`:"—"}</div></div><div style={{marginTop:6,display:"flex",gap:6}}>{risk&&<Badge risk={risk}/>}{a&&<StatusPill status={a.status}/>}{!a&&<span style={{fontSize:10,color:th.sub}}>Not submitted</span>}</div></div>;})}
          </div>
        </Card>
        <div style={{display:"flex",gap:10}}><Btn th={th} onClick={exportCSV}>⬇️ Export CSV</Btn><Btn th={th} variant="secondary" onClick={()=>window.print()}>🖨️ Print</Btn></div>

          {leaderboard.length===0&&<div style={{textAlign:"center",color:th.sub,padding:40,fontSize:14}}>No audit submissions yet for this month. Employees need to submit their audits to appear on the leaderboard.</div>}
          {leaderboard.map((u,i)=>{const medal=i===0?"🥇":i===1?"🥈":i===2?"🥉":"";const risk=riskOf(u.score);return<div key={u.id} style={{display:"flex",alignItems:"center",gap:14,padding:"14px 16px",borderRadius:12,marginBottom:8,background:i<3?RB[risk]:th.input,border:`1.5px solid ${i<3?RC[risk]+"44":th.border}`,boxShadow:i===0?"0 2px 12px #22c55e22":"none"}}>
            <div style={{width:36,fontSize:i<3?22:15,fontWeight:900,color:i<3?RC[risk]:th.sub,textAlign:"center"}}>{medal||`#${i+1}`}</div>
            <Avatar initials={u.avatar||makeAvatar(u.name)} size={40} color={i===0?"#f59e0b":i===1?"#94a3b8":i===2?"#cd7c47":"#7E05E8"}/>
            <div style={{flex:1}}><div style={{fontSize:14,fontWeight:700}}>{u.name}</div><div style={{fontSize:12,color:th.sub}}>{u.department}</div></div>
            <div style={{textAlign:"right"}}><div style={{fontSize:22,fontWeight:900,color:RC[risk]}}>{u.score}%</div><Badge risk={risk}/></div>

      {selectedAudit&&<AuditReviewModal th={th} audit={selectedAudit} users={users} rejectReason={rejectReason} setRejectReason={setRejectReason} onApprove={approveAudit} onReject={rejectAudit} onClose={()=>{setSelectedAudit(null);setRejectReason("");}}/>}
      {empModal&&<EmployeeModal th={th} mode={empModal.mode} employee={empModal.employee} departments={departments} onSave={saveEmployee} onClose={()=>setEmpModal(null)}/>}

        const userAudits=audits.filter(a=>a.userId===historyUser.id).sort((a,b)=>(b.period||'').localeCompare(a.period||''));
        return <Modal th={th} title={`📅 Audit History — ${historyUser.name}`} onClose={()=>setHistoryUser(null)} width={560}>
          {userAudits.length===0&&<div style={{color:th.sub,textAlign:"center",padding:20}}>No audit history yet.</div>}
          {userAudits.map(a=>{const sc=scoreAudit(a.checks);const risk=riskOf(sc);return<div key={a.id} style={{marginBottom:14,padding:"14px 16px",borderRadius:12,background:RB[risk],border:`1.5px solid ${RC[risk]}44`}}>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:10}}>
              <div style={{fontWeight:800,fontSize:14,color:RC[risk]}}>{periodLbl(a.period)}</div>
              <div style={{display:"flex",gap:6,alignItems:"center"}}><span style={{fontSize:18,fontWeight:900,color:RC[risk]}}>{sc}%</span><StatusPill status={a.status}/></div>
            </div>
            {SECURITY_CHECKS.map(c=>{const ss=a.screenshots?.[c.id];const hasImg=ss?.dataUrl&&(ss.dataUrl.startsWith('http')||ss.dataUrl.startsWith('data:'));return<div key={c.id} style={{display:"flex",alignItems:"center",justifyContent:"space-between",fontSize:12,padding:"5px 0",borderBottom:`1px solid ${RC[risk]}22`}}>
              <span>{a.checks[c.id]==="yes"?"✅":"❌"} {c.label}</span>
              {hasImg&&<img src={ss.dataUrl} style={{width:44,height:44,objectFit:"cover",borderRadius:6,cursor:"zoom-in",border:"1.5px solid #fff",boxShadow:"0 1px 4px #0002",flexShrink:0}} onClick={()=>setHistoryLightbox(ss.dataUrl)} title="Click to enlarge"/>}
            </div>;})}
            <div style={{fontSize:11,color:th.sub,marginTop:8}}>{fmt(a.submittedAt)} · v{a.version} · {a.deviceType} {a.deviceModel}</div>
            {a.rejectedReason&&<div style={{marginTop:6,background:"#fee2e2",borderRadius:6,padding:"4px 8px",fontSize:11,color:"#991b1b"}}>Rejected: {a.rejectedReason}</div>}
          </div>;})}
        </Modal>;
      })()}
    </div>
  );
}

// ── APP ROOT ──────────────────────────────────────────────────────────
function App(){
  const [user,setUser]=useState(null);
  const [darkMode,setDarkMode]=useState(false);
  const [users,setUsers]=useState([]);
  const [audits,setAudits]=useState([]);
  const [tasks,setTasks]=useState([]);
  const [activity,setActivity]=useState([]);
  const [notifications,setNotifications]=useState({});
  const [departments,setDepartments]=useState(DEFAULT_DEPTS);
  const [loading,setLoading]=useState(true);
  const [dbError,setDbError]=useState(null);
  const {toasts,add:addToast}=useToast();
  const th=darkMode?dark:light;
  const isReset=window.location.hash.includes('#reset');

  useEffect(()=>{ loadAll(); },[]);

  const loadAll=async()=>{
    setLoading(true); setDbError(null);
    try{
      const [u,a,t,act,n,d]=await Promise.all([
        db.from('users').select('*'),
        db.from('audits').select('*'),
        db.from('tasks').select('*'),
        db.from('activity').select('*').order('timestamp',{ascending:false}).limit(200),
        db.from('notifications').select('*').order('time',{ascending:false}).limit(500),
        db.from('departments').select('*'),
      ]);
      if(u.error)throw new Error(u.error.message);
      setUsers((u.data||[]).map(mapUser));
      setAudits((a.data||[]).map(mapAudit));
      setTasks((t.data||[]).map(mapTask));
      setActivity((act.data||[]).map(mapActiv));
