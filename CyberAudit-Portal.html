const mapUser  = r => ({id:r.id, email:r.email, name:r.name, role:r.role, password:r.password, department:r.department, avatar:r.avatar});

const mapTask  = r => ({id:r.id, userId:r.user_id, auditId:r.audit_id, checkId:r.check_id, label:r.label, status:r.status, priority:r.priority, assignedTo:r.assigned_to, createdAt:r.created_at, dueDate:r.due_date, comments:r.comments||[]});

// JS object → DB row (camelCase → snake_case)
const toDbUser  = u => ({id:u.id, email:u.email, name:u.name, role:u.role, password:u.password, department:u.department, avatar:u.avatar});
const toDbAudit = a => ({id:a.id, user_id:a.userId, version:a.version, device_type:a.deviceType, device_model:a.deviceModel, serial_number:a.serialNumber, os_version:a.osVersion, checks:a.checks, screenshots:a.screenshots, submitted_at:a.submittedAt, status:a.status, rejected_reason:a.rejectedReason||null, approved_by:a.approvedBy||null});
const toDbTask  = t => ({id:t.id, user_id:t.userId, audit_id:t.auditId, check_id:t.checkId, label:t.label, status:t.status, priority:t.priority, assigned_to:t.assignedTo, created_at:t.createdAt, due_date:t.dueDate, comments:t.comments||[]});
const toDbActiv = a => ({id:a.id, user_id:a.userId, action:a.action, target:a.target||null, timestamp:a.timestamp});
const toDbNotif = (n, userId) => ({id:n.id, user_id:userId, text:n.text, read:n.read, time:n.time});

// Upload screenshots to Supabase Storage bucket "screenshots"
// If the bucket doesn't exist yet, falls back gracefully (saves name only, no preview after refresh)
const uploadScreenshots = async (screenshots, userId) => {
  const result = {};
  for (const [checkId, ss] of Object.entries(screenshots)) {
    if (!ss) continue;
    if (ss.dataUrl && !ss.dataUrl.startsWith('data:')) { result[checkId] = ss; continue; } // already a URL
    if (ss.dataUrl && ss.dataUrl.startsWith('data:')) {
      try {
        const res  = await fetch(ss.dataUrl);
        const blob = await res.blob();
        const ext  = blob.type.split('/')[1] || 'png';
        const path = `${userId}/${checkId}_${Date.now()}.${ext}`;
        const { error } = await db.storage.from('screenshots').upload(path, blob, {upsert:true});
        if (!error) {
          const { data } = db.storage.from('screenshots').getPublicUrl(path);
          result[checkId] = { name: ss.name, dataUrl: data.publicUrl };
        } else {
          result[checkId] = { name: ss.name, dataUrl: '' }; // bucket not set up yet
        }
      } catch(err) { result[checkId] = { name: ss.name, dataUrl: '' }; }
    } else { result[checkId] = ss; }
  }
  return result;
};

// ── CONSTANTS ──────────────────────────────────────────────────────

const Btn    = ({variant="primary",th,children,...p}) => {

};

const Sel = ({th,children,...p}) => <select {...p} style={{width:"100%",padding:"9px 12px",borderRadius:8,border:`1.5px solid ${th.border}`,background:th.input,color:th.text,fontSize:14,boxSizing:"border-box",...p.style}}>{children}</select>;
const Modal = ({th,title,onClose,children,width=500}) => (

// ── LOGIN ──────────────────────────────────────────────────────────
function Login({onLogin,users}) {
  const [email,setEmail]=useState(""); const [pass,setPass]=useState("");
  const [err,setErr]=useState(""); const [attempts,setAttempts]=useState(0);
  const [locked,setLocked]=useState(false); const [lockTimer,setLockTimer]=useState(0);
  const [resetting,setResetting]=useState(false); const [resetEmail,setResetEmail]=useState(""); const [resetMsg,setResetMsg]=useState("");
  useEffect(()=>{
    if(locked&&lockTimer>0){const t=setTimeout(()=>setLockTimer(l=>l-1),1000);return()=>clearTimeout(t);}
    if(locked&&lockTimer===0) setLocked(false);
  },[locked,lockTimer]);
  const handle=()=>{
    if(locked) return;
    const u=users.find(u=>u.email===email&&u.password===pass);
    if(u){setErr("");onLogin(u);}
    else{const a=attempts+1;setAttempts(a);if(a>=3){setLocked(true);setLockTimer(30);setErr("Too many attempts. Locked for 30s.");}else setErr(`Invalid credentials. ${3-a} attempt(s) left.`);}
  };
  return (
    <div style={{minHeight:"100vh",background:"linear-gradient(135deg,#1e1b4b,#312e81,#4f46e5)",display:"flex",alignItems:"center",justifyContent:"center"}}>
      <div style={{background:"#fff",borderRadius:20,padding:40,width:380,boxShadow:"0 24px 64px #0005"}}>
        <div style={{textAlign:"center",marginBottom:28}}>
          <div style={{fontSize:40}}>🔐</div>
          <div style={{fontSize:22,fontWeight:800,color:"#1e1b4b",marginTop:6}}>CyberAudit Portal</div>
          <div style={{fontSize:12,color:"#64748b"}}>Self-Audit & Compliance Platform</div>
        </div>
        {!resetting ? (
          <>
            <label style={{fontSize:12,fontWeight:600,color:"#374151",display:"block",marginBottom:4}}>Company Email</label>
            <input value={email} onChange={e=>setEmail(e.target.value)} placeholder="you@company.com" onKeyDown={e=>e.key==="Enter"&&handle()} style={{width:"100%",padding:"10px 12px",borderRadius:8,border:"1.5px solid #e2e8f0",marginBottom:12,fontSize:14,boxSizing:"border-box"}} />
            <label style={{fontSize:12,fontWeight:600,color:"#374151",display:"block",marginBottom:4}}>Password</label>
            <input type="password" value={pass} onChange={e=>setPass(e.target.value)} placeholder="••••••••" onKeyDown={e=>e.key==="Enter"&&handle()} style={{width:"100%",padding:"10px 12px",borderRadius:8,border:"1.5px solid #e2e8f0",marginBottom:14,fontSize:14,boxSizing:"border-box"}} />
            {locked&&<div style={{background:"#fee2e2",borderRadius:8,padding:"8px 12px",fontSize:13,color:"#991b1b",marginBottom:10}}>🔒 Locked. Wait {lockTimer}s.</div>}
            {err&&!locked&&<div style={{color:"#ef4444",fontSize:13,marginBottom:10}}>{err}</div>}
            <button onClick={handle} disabled={locked} style={{width:"100%",background:locked?"#94a3b8":"#4f46e5",color:"#fff",border:"none",borderRadius:8,padding:11,fontSize:15,fontWeight:700,cursor:locked?"not-allowed":"pointer"}}>Sign In</button>
            <div style={{textAlign:"center",marginTop:12}}><button onClick={()=>setResetting(true)} style={{background:"none",border:"none",color:"#6366f1",fontSize:13,cursor:"pointer",textDecoration:"underline"}}>Forgot password?</button></div>
            <div style={{marginTop:18,background:"#f8fafc",borderRadius:8,padding:"12px 14px",fontSize:11,color:"#64748b"}}><strong>Demo:</strong> admin@company.com / admin123<br/>Employee: alice@company.com / pass123</div>
            {users.length===0&&<div style={{marginTop:12,background:"#fef3c7",borderRadius:8,padding:"10px 12px",fontSize:11,color:"#92400e"}}>⚠️ No users found. Run supabase-setup.sql in your Supabase SQL Editor first.</div>}
          </>
        ):(
          <>
            <div style={{fontSize:15,fontWeight:700,color:"#1e1b4b",marginBottom:12}}>Reset Password</div>
            <input value={resetEmail} onChange={e=>setResetEmail(e.target.value)} placeholder="your@company.com" style={{width:"100%",padding:"10px 12px",borderRadius:8,border:"1.5px solid #e2e8f0",marginBottom:12,fontSize:14,boxSizing:"border-box"}} />
            {resetMsg&&<div style={{fontSize:13,marginBottom:10,color:resetMsg.startsWith("✅")?"#16a34a":"#dc2626"}}>{resetMsg}</div>}
            <button onClick={()=>{const u=users.find(u=>u.email===resetEmail);setResetMsg(u?`✅ Reset link sent to ${resetEmail}`:"❌ Email not found.");}} style={{width:"100%",background:"#4f46e5",color:"#fff",border:"none",borderRadius:8,padding:10,fontSize:14,fontWeight:700,cursor:"pointer",marginBottom:8}}>Send Reset Link</button>
            <button onClick={()=>{setResetting(false);setResetMsg("");}} style={{width:"100%",background:"#f1f5f9",color:"#64748b",border:"none",borderRadius:8,padding:10,fontSize:14,cursor:"pointer"}}>← Back</button>
          </>
        )}
      </div>
    </div>
  );
}

// ── AUDIT FORM ─────────────────────────────────────────────────────
function AuditForm({user,audits,setAudits,tasks,setTasks,setActivity,setNotifications,onDone,th}) {
  // BUG FIX: find any audit including rejected, so device info pre-fills on resubmission
  const existing = audits.find(a=>a.userId===user.id);
  const [step,setStep]=useState(0);
  const [device,setDevice]=useState(existing?{deviceType:existing.deviceType,deviceModel:existing.deviceModel,serialNumber:existing.serialNumber,osVersion:existing.osVersion}:{deviceType:"",deviceModel:"",serialNumber:"",osVersion:""});
  const [checks,setChecks]=useState(existing?{...existing.checks}:{});
  const [screenshots,setScreenshots]=useState(existing?.screenshots||{});
  const [submitted,setSubmitted]=useState(false);
  const [submitting,setSubmitting]=useState(false);
  const fileRefs=useRef({});
  const handleFile=(id,e)=>{const f=e.target.files[0];if(!f)return;const r=new FileReader();r.onload=ev=>setScreenshots(s=>({...s,[id]:{name:f.name,dataUrl:ev.target.result}}));r.readAsDataURL(f);};
  const screenshotMissing=SECURITY_CHECKS.filter(c=>checks[c.id]==="yes"&&!screenshots[c.id]);
  const allChecksAnswered=SECURITY_CHECKS.every(c=>checks[c.id]);
  const canSubmit=allChecksAnswered&&screenshotMissing.length===0;

  const handleSubmit=async()=>{
    setSubmitting(true);
    const finalScreenshots = await uploadScreenshots(screenshots, user.id);
    const ver=existing?(existing.version||1)+1:1;
    const audit={id:existing?existing.id:`a${Date.now()}`,userId:user.id,version:ver,...device,checks,screenshots:finalScreenshots,submittedAt:new Date().toISOString(),status:"pending_review"};
    const newTasks=SECURITY_CHECKS.filter(c=>checks[c.id]==="no").map(c=>({id:`t${Date.now()}${Math.random()}`,userId:user.id,auditId:audit.id,checkId:c.id,label:c.task,status:"pending",priority:"high",assignedTo:"u1",createdAt:new Date().toISOString(),comments:[],dueDate:DEADLINE}));
    const actItem={id:`ac${Date.now()}`,userId:user.id,action:"submitted audit",target:"Self",timestamp:new Date().toISOString()};
    const notifItem={id:`n${Date.now()}`,text:`${user.name} submitted an audit for review`,read:false,time:new Date().toISOString()};
    // Update local state immediately
    setAudits(prev=>[...prev.filter(a=>a.userId!==user.id),audit]);
    setTasks(prev=>[...prev.filter(t=>t.userId!==user.id),...newTasks]);
    setActivity(prev=>[actItem,...prev]);
    setNotifications(prev=>({...prev,u1:[notifItem,...(prev.u1||[])]}));
    setSubmitted(true); setSubmitting(false);
    // Persist to Supabase
    try{
      await db.from('audits').delete().eq('user_id',user.id);
      await db.from('audits').insert(toDbAudit(audit));
      await db.from('tasks').delete().eq('user_id',user.id);
      if(newTasks.length>0) await db.from('tasks').insert(newTasks.map(toDbTask));
      await db.from('activity').insert(toDbActiv(actItem));
      await db.from('notifications').insert(toDbNotif(notifItem,'u1'));
    }catch(err){console.error('DB sync:',err);}
  };

  if(submitted) return <div style={{textAlign:"center",padding:60,color:th.text}}><div style={{fontSize:60}}>✅</div><div style={{fontSize:22,fontWeight:800,marginTop:12}}>Audit Submitted for Review!</div><div style={{color:th.sub,marginTop:8}}>An admin will review your submission shortly.</div><Btn th={th} style={{marginTop:24}} onClick={onDone}>← Back to Dashboard</Btn></div>;
  const steps=["Device Info","Security Checks","Review & Submit"];
  const complete0=device.deviceType&&device.deviceModel&&device.osVersion;
  return (
    <div style={{maxWidth:680,margin:"0 auto",padding:"28px 16px",color:th.text}}>
      <div style={{marginBottom:20}}>
        <div style={{fontSize:20,fontWeight:800}}>🛡️ Security Self-Audit {existing?`(Update — v${(existing.version||1)+1})`:""}</div>
        <div style={{fontSize:13,color:th.sub}}>Deadline: {fmt(DEADLINE)} ({daysLeft(DEADLINE)} days left)</div>
        <div style={{display:"flex",gap:6,marginTop:14}}>
          {steps.map((s,i)=><div key={i} onClick={()=>i<step&&setStep(i)} style={{flex:1,padding:"8px 4px",textAlign:"center",borderRadius:8,fontSize:12,fontWeight:700,cursor:i<step?"pointer":"default",background:step===i?th.accent:i<step?"#22c55e":th.border,color:step===i||i<step?"#fff":th.sub}}>{i<step?"✓":i+1}. {s}</div>)}
        </div>
      </div>
      <Card th={th}>
        {step===0&&(
          <><div style={{fontSize:15,fontWeight:700,marginBottom:16}}>🖥️ Device Information</div>
          {[["Device Type","deviceType",["Mac","Windows","Linux"]],["Device Model","deviceModel"],["Serial Number","serialNumber"],["OS Version","osVersion"]].map(([lbl,key,opts])=>(
            <div key={key} style={{marginBottom:14}}>
              <label style={{fontSize:12,fontWeight:600,color:th.sub,display:"block",marginBottom:4}}>{lbl}{["deviceType","deviceModel","osVersion"].includes(key)&&<span style={{color:"#ef4444"}}> *</span>}</label>
              {opts?<Sel th={th} value={device[key]} onChange={e=>setDevice(d=>({...d,[key]:e.target.value}))}><option value="">Select…</option>{opts.map(o=><option key={o}>{o}</option>)}</Sel>:<Inp th={th} value={device[key]} onChange={e=>setDevice(d=>({...d,[key]:e.target.value}))} />}
            </div>
          ))}
          <Btn th={th} onClick={()=>setStep(1)} disabled={!complete0}>Next →</Btn></>
        )}
        {step===1&&(
          <><div style={{fontSize:15,fontWeight:700,marginBottom:4}}>✅ Security Checks</div>
          <div style={{fontSize:12,color:th.sub,marginBottom:14}}>📸 Screenshot is <strong>mandatory</strong> for every item marked <strong>Yes</strong>.</div>
          {SECURITY_CHECKS.map(chk=>{
            const val=checks[chk.id]; const missing=val==="yes"&&!screenshots[chk.id];
            return <div key={chk.id} style={{marginBottom:14,padding:"14px 16px",borderRadius:10,border:`1.5px solid ${missing?"#f59e0b":val==="yes"?"#86efac":val==="no"?"#fca5a5":th.border}`,background:missing?"#fffbeb":val==="yes"?RB.secure:val==="no"?RB.danger:th.input}}>
              <div style={{fontWeight:600,fontSize:13,marginBottom:10}}>{chk.icon} {chk.label}</div>
              <div style={{display:"flex",gap:10,alignItems:"center",flexWrap:"wrap"}}>
                {["yes","no"].map(v=><label key={v} style={{display:"flex",alignItems:"center",gap:6,cursor:"pointer",fontSize:13,fontWeight:600,color:val===v?(v==="yes"?"#16a34a":"#dc2626"):th.sub}}><input type="radio" name={chk.id} value={v} checked={val===v} onChange={()=>setChecks(c=>({...c,[chk.id]:v}))} />{v==="yes"?"✅ Yes":"❌ No"}</label>)}
                <div style={{marginLeft:"auto",display:"flex",alignItems:"center",gap:8}}>
                  {screenshots[chk.id]&&screenshots[chk.id].dataUrl&&<img src={screenshots[chk.id].dataUrl} alt="proof" style={{width:36,height:36,objectFit:"cover",borderRadius:6}} />}
                  <div><input type="file" accept="image/*" ref={el=>fileRefs.current[chk.id]=el} onChange={e=>handleFile(chk.id,e)} style={{display:"none"}} />
                  <button onClick={()=>fileRefs.current[chk.id]?.click()} style={{fontSize:11,padding:"5px 10px",borderRadius:6,border:`1.5px solid ${missing?"#f59e0b":th.border}`,background:missing?"#fef3c7":th.card,cursor:"pointer",color:missing?"#92400e":th.sub,fontWeight:missing?700:400}}>{screenshots[chk.id]?"📸 Change":missing?"⚠️ Upload required":"📸 Upload proof"}</button></div>
                </div>
              </div>
              {missing&&<div style={{fontSize:11,color:"#b45309",marginTop:8,fontWeight:600}}>⚠️ Screenshot required for "Yes" answers.</div>}
            </div>;
          })}
          <div style={{display:"flex",gap:10,marginTop:8}}><Btn th={th} variant="ghost" onClick={()=>setStep(0)}>← Back</Btn><Btn th={th} onClick={()=>setStep(2)} disabled={!allChecksAnswered||screenshotMissing.length>0}>{screenshotMissing.length>0?`Missing ${screenshotMissing.length} screenshot(s)`:"Review →"}</Btn></div></>
        )}
        {step===2&&(
          <><div style={{fontSize:15,fontWeight:700,marginBottom:16}}>📋 Review & Submit</div>
          <div style={{background:th.input,borderRadius:10,padding:14,marginBottom:16,fontSize:13}}><strong>Device:</strong> {device.deviceType} · {device.deviceModel} · {device.osVersion}</div>
          <div style={{display:"flex",flexDirection:"column",gap:8,marginBottom:18}}>

// ── EMPLOYEE MODAL ─────────────────────────────────────────────────
function EmployeeModal({th,mode,employee,onSave,onClose}) {
  const [form,setForm]=useState(employee||{name:"",email:"",password:"pass123",department:"Engineering",role:"employee"});
  const [err,setErr]=useState("");
  const set=(k,v)=>setForm(f=>({...f,[k]:v}));
  const save=()=>{
    if(!form.name.trim()||!form.email.trim()||!form.password.trim()){setErr("Name, email, and password are required.");return;}
    if(!/\S+@\S+\.\S+/.test(form.email)){setErr("Invalid email address.");return;}
    onSave({...form,id:employee?.id||uid(),avatar:makeAvatar(form.name)});
  };
  return (
    <Modal th={th} title={mode==="add"?"➕ Add Employee":"✏️ Edit Employee"} onClose={onClose}>
      {[["Full Name","name","text"],["Email","email","email"],["Password","password","text"]].map(([lbl,key,type])=>(
        <div key={key} style={{marginBottom:14}}><label style={{fontSize:12,fontWeight:600,color:th.sub,display:"block",marginBottom:4}}>{lbl} <span style={{color:"#ef4444"}}>*</span></label><Inp th={th} type={type} value={form[key]||""} onChange={e=>set(key,e.target.value)} /></div>
      ))}
      <div style={{marginBottom:14}}><label style={{fontSize:12,fontWeight:600,color:th.sub,display:"block",marginBottom:4}}>Department</label><Sel th={th} value={form.department} onChange={e=>set("department",e.target.value)}>{DEPARTMENTS.map(d=><option key={d}>{d}</option>)}</Sel></div>
      <div style={{marginBottom:18}}><label style={{fontSize:12,fontWeight:600,color:th.sub,display:"block",marginBottom:4}}>Role</label><Sel th={th} value={form.role} onChange={e=>set("role",e.target.value)}><option value="employee">Employee</option><option value="admin">Admin</option></Sel></div>
      {err&&<div style={{color:"#ef4444",fontSize:13,marginBottom:12}}>{err}</div>}
      <div style={{display:"flex",gap:10}}><Btn th={th} variant="success" onClick={save}>{mode==="add"?"Add Employee":"Save Changes"}</Btn><Btn th={th} variant="ghost" onClick={onClose}>Cancel</Btn></div>
    </Modal>
  );
}

// ── BULK IMPORT MODAL ──────────────────────────────────────────────
function BulkImportModal({th,onImport,onClose}) {
  const [preview,setPreview]=useState([]); const [err,setErr]=useState(""); const [importing,setImporting]=useState(false); const fileRef=useRef();
  const handleFile=async(e)=>{
    const f=e.target.files[0];if(!f)return;setErr("");setPreview([]);
    try{
      const text=await f.text(); const lines=text.split(/\r?\n/).filter(l=>l.trim());
      const headers=lines[0].split(",").map(h=>h.trim().toLowerCase());
      const ni=headers.findIndex(h=>h.includes("name")); const ei=headers.findIndex(h=>h.includes("email")); const di=headers.findIndex(h=>h.includes("dept")||h.includes("department")); const pi=headers.findIndex(h=>h.includes("pass"));
      if(ni===-1||ei===-1){setErr("CSV must have at least 'name' and 'email' columns.");return;}
      const rows=lines.slice(1).map(line=>{const cols=line.split(",").map(c=>c.trim());return{id:uid(),name:cols[ni]||"",email:cols[ei]||"",department:di!==-1?(cols[di]||"Engineering"):"Engineering",password:pi!==-1?(cols[pi]||"pass123"):"pass123",role:"employee",avatar:makeAvatar(cols[ni]||"U")};}).filter(r=>r.name&&r.email);
      if(rows.length===0){setErr("No valid rows found.");return;}setPreview(rows);
    }catch(_){setErr("Failed to parse file.");}
  };
  return (
    <Modal th={th} title="📥 Bulk Import Employees" onClose={onClose} width={620}>
      <div style={{background:th.input,borderRadius:10,padding:"14px 16px",marginBottom:16,fontSize:13,color:th.sub,lineHeight:1.7}}><strong style={{color:th.text}}>Expected CSV format:</strong><br/><code style={{background:th.border,padding:"2px 6px",borderRadius:4,fontSize:12}}>name,email,department,password</code><br/>Columns <strong>name</strong> and <strong>email</strong> are required.</div>
      <div style={{border:`2px dashed ${th.border}`,borderRadius:10,padding:"24px",textAlign:"center",marginBottom:16,cursor:"pointer"}} onClick={()=>fileRef.current?.click()}><input type="file" accept=".csv" ref={fileRef} onChange={handleFile} style={{display:"none"}} /><div style={{fontSize:32,marginBottom:8}}>📂</div><div style={{fontSize:14,fontWeight:600,color:th.text}}>Click to upload CSV</div></div>
      {err&&<div style={{background:RB.danger,borderRadius:8,padding:"10px 14px",color:"#991b1b",fontSize:13,marginBottom:14}}>❌ {err}</div>}
      {preview.length>0&&<><div style={{fontSize:13,fontWeight:700,marginBottom:10,color:th.text}}>Preview — {preview.length} employee(s) to import:</div><div style={{maxHeight:200,overflowY:"auto",border:`1px solid ${th.border}`,borderRadius:10,marginBottom:16}}><table style={{width:"100%",borderCollapse:"collapse",fontSize:12}}><thead><tr style={{background:th.input}}>{["Name","Email","Department"].map(h=><th key={h} style={{padding:"8px 10px",textAlign:"left",fontWeight:700,color:th.sub,borderBottom:`1px solid ${th.border}`}}>{h}</th>)}</tr></thead><tbody>{preview.map((r,i)=><tr key={i}><td style={{padding:"7px 10px",color:th.text}}>{r.name}</td><td style={{padding:"7px 10px",color:th.sub}}>{r.email}</td><td style={{padding:"7px 10px",color:th.sub}}>{r.department}</td></tr>)}</tbody></table></div><div style={{display:"flex",gap:10}}><Btn th={th} variant="success" onClick={()=>{setImporting(true);setTimeout(()=>onImport(preview),300);}} disabled={importing}>{importing?"Importing…":`✅ Import ${preview.length} Employee(s)`}</Btn><Btn th={th} variant="ghost" onClick={()=>{setPreview([]);setErr("");}}>Clear</Btn></div></>}
    </Modal>
  );
}

// ── ADMIN DASHBOARD ────────────────────────────────────────────────
function AdminDashboard({user,users,setUsers,audits,setAudits,tasks,setTasks,activity,setActivity,notifications,setNotifications,th}) {
  const [tab,setTab]=useState("overview"); const [search,setSearch]=useState(""); const [filterDept,setFilterDept]=useState("All"); const [filterRisk,setFilterRisk]=useState("All"); const [taskFilter,setTaskFilter]=useState("all");
  const [selectedAudit,setSelectedAudit]=useState(null); const [rejectReason,setRejectReason]=useState(""); const [commentText,setCommentText]=useState({});
  const [empModal,setEmpModal]=useState(null); const [bulkModal,setBulkModal]=useState(false); const [deleteModal,setDeleteModal]=useState(null);
  const employees=users.filter(u=>u.id!==user.id);
  const relevantAudits=audits.filter(a=>users.some(u=>u.id===a.userId));
  const unreadCount=(notifications[user.id]||[]).filter(n=>!n.read).length;
  const markAdminRead=()=>{
    setNotifications(prev=>({...prev,[user.id]:(prev[user.id]||[]).map(n=>({...n,read:true}))}));
    db.from('notifications').update({read:true}).eq('user_id',user.id).then();
  };
  const scoreAll=relevantAudits.map(a=>scoreAudit(a.checks));
  const avgScore=scoreAll.length?Math.round(scoreAll.reduce((s,x)=>s+x,0)/scoreAll.length):0;
  const fullySecure=relevantAudits.filter(a=>scoreAudit(a.checks)===100).length;
  const withIssues=relevantAudits.filter(a=>scoreAudit(a.checks)<100).length;
  const pendingReview=relevantAudits.filter(a=>a.status==="pending_review").length;
  const countMissing=id=>relevantAudits.filter(a=>a.checks[id]==="no").length;
  const trendData=[62,68,71,74,78,avgScore]; const maxT=Math.max(...trendData);

  const approveAudit=async(a)=>{
    const actItem={id:`ac${Date.now()}`,userId:user.id,action:"approved audit",target:users.find(u=>u.id===a.userId)?.name,timestamp:new Date().toISOString()};
    const notifItem={id:`n${Date.now()}`,text:"✅ Your audit has been approved!",read:false,time:new Date().toISOString()};
    setAudits(prev=>prev.map(x=>x.id===a.id?{...x,status:"approved",approvedBy:user.id}:x));
    setActivity(prev=>[actItem,...prev]);
    setNotifications(prev=>({...prev,[a.userId]:[notifItem,...(prev[a.userId]||[])]}));
    setSelectedAudit(null);
    try{
      await db.from('audits').update({status:"approved",approved_by:user.id}).eq('id',a.id);
      await db.from('activity').insert(toDbActiv(actItem));
      await db.from('notifications').insert(toDbNotif(notifItem,a.userId));
    }catch(err){console.error('DB:',err);}
  };

  const rejectAudit=async(a)=>{
    if(!rejectReason.trim())return;
    const actItem={id:`ac${Date.now()}`,userId:user.id,action:"rejected audit",target:users.find(u=>u.id===a.userId)?.name,timestamp:new Date().toISOString()};
    const notifItem={id:`n${Date.now()}`,text:`❌ Audit rejected: ${rejectReason}`,read:false,time:new Date().toISOString()};
    setAudits(prev=>prev.map(x=>x.id===a.id?{...x,status:"rejected",rejectedReason:rejectReason}:x));
    setActivity(prev=>[actItem,...prev]);
    setNotifications(prev=>({...prev,[a.userId]:[notifItem,...(prev[a.userId]||[])]}));
    setRejectReason(""); setSelectedAudit(null);
    try{
      await db.from('audits').update({status:"rejected",rejected_reason:rejectReason}).eq('id',a.id);
      await db.from('activity').insert(toDbActiv(actItem));
      await db.from('notifications').insert(toDbNotif(notifItem,a.userId));
    }catch(err){console.error('DB:',err);}
  };

  const addComment=async(tid)=>{
    const txt=(commentText[tid]||"").trim(); if(!txt)return;
    const task=tasks.find(t=>t.id===tid);
    const newComment={id:`c${Date.now()}`,userId:user.id,text:txt,time:new Date().toISOString()};
    const updatedComments=[...(task?.comments||[]),newComment];
    setTasks(prev=>prev.map(t=>t.id===tid?{...t,comments:updatedComments}:t));
    setCommentText(p=>({...p,[tid]:""}));
    try{ await db.from('tasks').update({comments:updatedComments}).eq('id',tid); }catch(err){console.error('DB:',err);}
  };

  const sendReminder=async(emp)=>{
    const notifItem={id:`n${Date.now()}`,text:"⚠️ Reminder: Please submit your security audit!",read:false,time:new Date().toISOString()};
    const actItem={id:`ac${Date.now()}`,userId:user.id,action:"sent reminder to",target:emp.name,timestamp:new Date().toISOString()};
    setNotifications(prev=>({...prev,[emp.id]:[notifItem,...(prev[emp.id]||[])]}));
    setActivity(prev=>[actItem,...prev]);
    try{
      await db.from('notifications').insert(toDbNotif(notifItem,emp.id));
      await db.from('activity').insert(toDbActiv(actItem));
    }catch(err){console.error('DB:',err);}
  };

  const saveEmployee=async(emp)=>{
    const actItem={id:`ac${Date.now()}`,userId:user.id,action:empModal.mode==="add"?"added employee":"updated employee",target:emp.name,timestamp:new Date().toISOString()};
    if(empModal.mode==="add"){setUsers(prev=>[...prev,emp]);}else{setUsers(prev=>prev.map(u=>u.id===emp.id?emp:u));}
    setActivity(prev=>[actItem,...prev]); setEmpModal(null);
    try{
      if(empModal.mode==="add"){await db.from('users').insert(toDbUser(emp));}
      else{await db.from('users').update(toDbUser(emp)).eq('id',emp.id);}
      await db.from('activity').insert(toDbActiv(actItem));
    }catch(err){console.error('DB:',err);}
  };

  const bulkImport=async(emps)=>{
    const existing=users.map(u=>u.email.toLowerCase());
    const newEmps=emps.filter(e=>!existing.includes(e.email.toLowerCase()));
    const actItem={id:`ac${Date.now()}`,userId:user.id,action:`bulk imported ${newEmps.length} employees`,target:"",timestamp:new Date().toISOString()};
    setUsers(prev=>[...prev,...newEmps]);
    setActivity(prev=>[actItem,...prev]); setBulkModal(false);
    try{
      if(newEmps.length>0) await db.from('users').insert(newEmps.map(toDbUser));
      await db.from('activity').insert(toDbActiv(actItem));
    }catch(err){console.error('DB:',err);}
  };

  const deleteEmployee=async(emp)=>{
    const actItem={id:`ac${Date.now()}`,userId:user.id,action:"removed employee",target:emp.name,timestamp:new Date().toISOString()};
    setUsers(prev=>prev.filter(u=>u.id!==emp.id));
    setAudits(prev=>prev.filter(a=>a.userId!==emp.id));
    setTasks(prev=>prev.filter(t=>t.userId!==emp.id));
    setActivity(prev=>[actItem,...prev]); setDeleteModal(null);
    try{
      await db.from('users').delete().eq('id',emp.id); // cascades to audits & tasks
      await db.from('activity').insert(toDbActiv(actItem));
    }catch(err){console.error('DB:',err);}
  };

  const exportCSV=()=>{const rows=[["Name","Email","Dept","Role","Score","Status"]];users.forEach(u=>{const a=audits.find(x=>x.userId===u.id);const sc=a?scoreAudit(a.checks):null;rows.push([u.name,u.email,u.department,u.role,sc!==null?`${sc}%`:"N/A",a?RL[riskOf(sc)]:"Not Submitted"]);});const blob=new Blob([rows.map(r=>r.join(",")).join("\n")],{type:"text/csv"});const a=document.createElement("a");a.href=URL.createObjectURL(blob);a.download="security_report.csv";a.click();};
  const filteredEmployees=employees.filter(u=>{const a=audits.find(x=>x.userId===u.id);const sc=a?scoreAudit(a.checks):null;const risk=sc!==null?riskOf(sc):null;return(u.name.toLowerCase().includes(search.toLowerCase())||u.email.toLowerCase().includes(search.toLowerCase()))&&(filterDept==="All"||u.department===filterDept)&&(filterRisk==="All"||(filterRisk==="none"&&!a)||risk===filterRisk);});
  const filteredTasks=tasks.filter(t=>users.some(u=>u.id===t.userId)&&(taskFilter==="all"||t.status===taskFilter));
  const TABS=[["overview","📊","Overview"],["employees","👥","Employees"],["tasks","📋","Tasks"],["reports","📈","Reports"],["activity","🕐","Activity"]];
  return (
    <div style={{maxWidth:1020,margin:"0 auto",padding:"24px 16px",color:th.text}}>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:20,flexWrap:"wrap",gap:12}}>
        <div><div style={{fontSize:20,fontWeight:800}}>🛡️ Admin Dashboard</div><div style={{fontSize:13,color:th.sub}}>{user.name} · Administrator</div></div>
        <button onClick={markAdminRead} style={{background:th.card,border:`1.5px solid ${th.border}`,borderRadius:10,padding:"8px 14px",cursor:"pointer",color:th.text,fontSize:15}}>🔔{unreadCount>0&&<span style={{background:"#ef4444",color:"#fff",borderRadius:99,padding:"1px 6px",fontSize:10,fontWeight:700,marginLeft:4}}>{unreadCount}</span>}</button>
      </div>
      <div style={{display:"flex",gap:6,marginBottom:22,flexWrap:"wrap"}}>
        {TABS.map(([id,icon,lbl])=><button key={id} onClick={()=>setTab(id)} style={{padding:"8px 16px",borderRadius:8,border:"none",fontSize:13,fontWeight:700,cursor:"pointer",background:tab===id?th.accent:th.input,color:tab===id?"#fff":th.sub}}>{icon} {lbl}{id==="employees"&&pendingReview>0&&<span style={{background:"#ef4444",color:"#fff",borderRadius:99,padding:"0 5px",fontSize:10,marginLeft:4}}>{pendingReview}</span>}</button>)}
      </div>

      {tab==="overview"&&(<>
        <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fit,minmax(130px,1fr))",gap:12,marginBottom:18}}>
          {[["Total Users",users.length,"#6366f1"],["Submitted",relevantAudits.length,"#0ea5e9"],["Pending Review",pendingReview,"#f59e0b"],["Fully Secure",fullySecure,"#22c55e"],["Issues Found",withIssues,"#ef4444"],["Avg Score",`${avgScore}%`,"#8b5cf6"]].map(([lbl,val,col])=><Card key={lbl} th={th} style={{textAlign:"center",padding:"16px 10px"}}><div style={{fontSize:24,fontWeight:900,color:col}}>{val}</div><div style={{fontSize:11,color:th.sub,marginTop:2}}>{lbl}</div></Card>)}
        </div>
        <Card th={th} style={{marginBottom:16}}><div style={{fontSize:14,fontWeight:700,marginBottom:14}}>📈 Compliance Trend</div><div style={{display:"flex",gap:8,alignItems:"flex-end",height:80}}>{trendData.map((v,i)=><div key={i} style={{flex:1,display:"flex",flexDirection:"column",alignItems:"center",gap:4}}><div style={{fontSize:10,fontWeight:700,color:i===trendData.length-1?th.accent:th.sub}}>{v}%</div><div style={{width:"100%",height:`${(v/maxT)*60}px`,background:i===trendData.length-1?th.accent:th.border,borderRadius:"4px 4px 0 0"}} /><div style={{fontSize:9,color:th.sub}}>{["Oct","Nov","Dec","Jan","Feb","Mar"][i]}</div></div>)}</div></Card>
        <Card th={th} style={{marginBottom:16}}><div style={{fontSize:14,fontWeight:700,marginBottom:14}}>🚨 Compliance Indicators</div>{SECURITY_CHECKS.map(c=>{const n=countMissing(c.id);const pct=users.length?(n/users.length)*100:0;const col=pct===0?"#22c55e":pct<30?"#f59e0b":"#ef4444";return<div key={c.id} style={{marginBottom:12}}><div style={{display:"flex",justifyContent:"space-between",fontSize:12,marginBottom:4}}><span>{c.icon} {c.label}</span><span style={{fontWeight:700,color:col}}>{n} missing</span></div><div style={{background:th.border,borderRadius:99,height:6}}><div style={{width:`${pct}%`,background:col,height:6,borderRadius:99}} /></div></div>;})}</Card>
        <Card th={th}><div style={{fontSize:14,fontWeight:700,marginBottom:12}}>📭 Needs Attention</div>{users.filter(u=>!audits.find(a=>a.userId===u.id&&a.status!=="rejected")).map(u=><div key={u.id} style={{display:"flex",alignItems:"center",justifyContent:"space-between",padding:"9px 0",borderBottom:`1px solid ${th.border}`}}><div style={{display:"flex",gap:10,alignItems:"center"}}><Avatar initials={u.avatar} size={28} color="#6366f1"/><div><div style={{fontSize:13,fontWeight:600}}>{u.name}</div><div style={{fontSize:11,color:th.sub}}>{u.department}</div></div></div><Btn th={th} variant="secondary" style={{fontSize:11,padding:"4px 10px"}} onClick={()=>sendReminder(u)}>🔔 Remind</Btn></div>)}{users.every(u=>audits.find(a=>a.userId===u.id&&a.status!=="rejected"))&&<div style={{color:th.sub,fontSize:13}}>All users submitted ✅</div>}</Card>
      </>)}

      {tab==="employees"&&(
        <Card th={th}>
          <div style={{display:"flex",gap:10,marginBottom:16,flexWrap:"wrap",alignItems:"center"}}>
            <Inp th={th} placeholder="🔍 Search…" value={search} onChange={e=>setSearch(e.target.value)} style={{flex:2,minWidth:140}} />
            <Sel th={th} value={filterDept} onChange={e=>setFilterDept(e.target.value)} style={{flex:1,minWidth:110}}><option>All</option>{DEPARTMENTS.map(d=><option key={d}>{d}</option>)}</Sel>
            <Sel th={th} value={filterRisk} onChange={e=>setFilterRisk(e.target.value)} style={{flex:1,minWidth:120}}><option value="All">All Statuses</option><option value="secure">Secure</option><option value="warning">Warning</option><option value="danger">Danger</option><option value="none">Not Submitted</option></Sel>
            <Btn th={th} onClick={()=>setEmpModal({mode:"add"})} style={{whiteSpace:"nowrap"}}>➕ Add</Btn>
            <Btn th={th} variant="secondary" onClick={()=>setBulkModal(true)} style={{whiteSpace:"nowrap"}}>📥 Import</Btn>
          </div>
          <div style={{overflowX:"auto"}}><table style={{width:"100%",borderCollapse:"collapse",fontSize:13}}>
            <thead><tr style={{background:th.input}}>{["Employee","Dept","Role","Device","Score","Status","Actions"].map(h=><th key={h} style={{padding:"10px 12px",textAlign:"left",fontWeight:700,color:th.sub,borderBottom:`2px solid ${th.border}`,whiteSpace:"nowrap"}}>{h}</th>)}</tr></thead>
            <tbody>{filteredEmployees.map(u=>{const a=audits.find(x=>x.userId===u.id);const sc=a?scoreAudit(a.checks):null;const risk=sc!==null?riskOf(sc):null;return<tr key={u.id} style={{borderBottom:`1px solid ${th.border}`}}>
              <td style={{padding:"10px 12px"}}><div style={{display:"flex",gap:8,alignItems:"center"}}><Avatar initials={u.avatar} size={28} color="#6366f1"/><div><div style={{fontWeight:600}}>{u.name}</div><div style={{color:th.sub,fontSize:11}}>{u.email}</div></div></div></td>
              <td style={{padding:"10px 12px",color:th.sub}}>{u.department}</td>
              <td style={{padding:"10px 12px"}}><span style={{background:u.role==="admin"?"#ede9fe":"#f0fdf4",color:u.role==="admin"?"#5b21b6":"#166534",padding:"2px 8px",borderRadius:99,fontSize:11,fontWeight:700}}>{u.role}</span></td>
              <td style={{padding:"10px 12px",color:th.sub,fontSize:12}}>{a?`${a.deviceType} · ${a.deviceModel}`:"—"}</td>
              <td style={{padding:"10px 12px",fontWeight:800,color:sc!==null?RC[risk]:th.sub}}>{sc!==null?`${sc}%`:"—"}</td>
              <td style={{padding:"10px 12px"}}><div style={{display:"flex",gap:4,flexWrap:"wrap"}}>{risk&&<Badge risk={risk}/>}{a&&<StatusPill status={a.status}/>}{!a&&<span style={{fontSize:11,color:th.sub}}>Not submitted</span>}</div></td>
              <td style={{padding:"10px 12px"}}><div style={{display:"flex",gap:6}}>
                {a&&<button onClick={()=>setSelectedAudit(a)} style={{fontSize:11,padding:"4px 8px",borderRadius:6,border:`1px solid ${th.border}`,background:th.card,cursor:"pointer",color:th.accent,fontWeight:700}}>Review</button>}
                <button onClick={()=>setEmpModal({mode:"edit",employee:u})} style={{fontSize:11,padding:"4px 8px",borderRadius:6,border:`1px solid ${th.border}`,background:th.card,cursor:"pointer",color:th.sub}}>✏️</button>
                {(!a||a.status==="rejected")&&<button onClick={()=>sendReminder(u)} style={{fontSize:11,padding:"4px 8px",borderRadius:6,border:`1px solid ${th.accent}`,background:"transparent",cursor:"pointer",color:th.accent,fontWeight:700}}>🔔</button>}
                <button onClick={()=>setDeleteModal(u)} style={{fontSize:11,padding:"4px 8px",borderRadius:6,border:"1px solid #fca5a5",background:"#fee2e2",cursor:"pointer",color:"#dc2626",fontWeight:700}}>🗑️</button>
              </div></td>
            </tr>;})}
            </tbody></table>{filteredEmployees.length===0&&<div style={{textAlign:"center",color:th.sub,padding:28}}>No employees match your filters.</div>}
          </div>
          <div style={{marginTop:12,fontSize:12,color:th.sub}}>Showing {filteredEmployees.length} of {employees.length} users</div>
        </Card>
      )}

      {tab==="tasks"&&(
        <Card th={th}>
          <div style={{display:"flex",gap:8,marginBottom:16,flexWrap:"wrap"}}>{["all","pending","in_progress","completed"].map(s=><button key={s} onClick={()=>setTaskFilter(s)} style={{padding:"6px 14px",borderRadius:8,border:"none",fontSize:12,fontWeight:700,cursor:"pointer",background:taskFilter===s?th.accent:th.input,color:taskFilter===s?"#fff":th.sub}}>{s==="all"?"All":s==="in_progress"?"In Progress":s.charAt(0).toUpperCase()+s.slice(1)} ({tasks.filter(t=>users.some(u=>u.id===t.userId)&&(s==="all"||t.status===s)).length})</button>)}</div>
          {filteredTasks.length===0&&<div style={{color:th.sub,textAlign:"center",padding:28}}>No tasks found 🎉</div>}
          {filteredTasks.map(t=>{const emp=users.find(u=>u.id===t.userId);const assignee=users.find(u=>u.id===t.assignedTo);return<div key={t.id} style={{padding:"14px 0",borderBottom:`1px solid ${th.border}`}}>
            <div style={{display:"flex",justifyContent:"space-between",flexWrap:"wrap",gap:8}}>
              <div><div style={{fontSize:13,fontWeight:700}}>⚠️ {t.label}</div><div style={{fontSize:11,color:th.sub,marginTop:2}}>{emp?.name} · Due {fmt(t.dueDate)} · Assigned: {assignee?.name||"Unassigned"}</div></div>
              <div style={{display:"flex",gap:8,alignItems:"center",flexWrap:"wrap"}}><StatusPill status={t.status}/>
                <select value={t.status} onChange={async e=>{
                  const s=e.target.value;
                  const actItem={id:`ac${Date.now()}`,userId:user.id,action:`updated task to ${s}`,target:t.label,timestamp:new Date().toISOString()};
                  setTasks(prev=>prev.map(x=>x.id===t.id?{...x,status:s}:x));
                  setActivity(prev=>[actItem,...prev]);
                  try{ await db.from('tasks').update({status:s}).eq('id',t.id); await db.from('activity').insert(toDbActiv(actItem)); }catch(err){console.error(err);}
                }} style={{fontSize:11,padding:"4px 8px",borderRadius:6,border:`1.5px solid ${th.border}`,background:th.card,color:th.text,cursor:"pointer"}}><option value="pending">Pending</option><option value="in_progress">In Progress</option><option value="completed">Completed</option></select>
                <select value={t.assignedTo||""} onChange={async e=>{
                  const v=e.target.value;
                  setTasks(prev=>prev.map(x=>x.id===t.id?{...x,assignedTo:v}:x));
                  try{ await db.from('tasks').update({assigned_to:v}).eq('id',t.id); }catch(err){console.error(err);}
                }} style={{fontSize:11,padding:"4px 8px",borderRadius:6,border:`1.5px solid ${th.border}`,background:th.card,color:th.text,cursor:"pointer"}}><option value="">Unassigned</option>{users.filter(u=>u.role==="admin").map(u=><option key={u.id} value={u.id}>{u.name}</option>)}</select>
              </div>
            </div>
            <div style={{marginTop:10}}>{(t.comments||[]).map(c=>{const cu=users.find(u=>u.id===c.userId);return<div key={c.id} style={{fontSize:12,color:th.sub,marginBottom:4}}>💬 <strong>{cu?.name}:</strong> {c.text} · <span style={{fontSize:10}}>{fmtTime(c.time)}</span></div>;})}
              <div style={{display:"flex",gap:8,marginTop:6}}><input value={commentText[t.id]||""} onChange={e=>setCommentText(p=>({...p,[t.id]:e.target.value}))} placeholder="Add comment…" onKeyDown={e=>e.key==="Enter"&&addComment(t.id)} style={{flex:1,fontSize:12,padding:"5px 10px",borderRadius:6,border:`1px solid ${th.border}`,background:th.input,color:th.text}} /><button onClick={()=>addComment(t.id)} style={{fontSize:12,padding:"5px 12px",borderRadius:6,background:th.accent,color:"#fff",border:"none",cursor:"pointer",fontWeight:700}}>Send</button></div>
            </div>
          </div>;})}
        </Card>
      )}

      {tab==="reports"&&(<>
        <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fit,minmax(150px,1fr))",gap:12,marginBottom:16}}>{[["Overall Compliance",`${avgScore}%`,"#6366f1"],["Submitted",`${relevantAudits.length}/${users.length}`,"#0ea5e9"],["Open Tasks",tasks.filter(t=>t.status!=="completed").length,"#f59e0b"]].map(([lbl,val,col])=><Card key={lbl} th={th} style={{textAlign:"center"}}><div style={{fontSize:26,fontWeight:900,color:col}}>{val}</div><div style={{fontSize:12,color:th.sub}}>{lbl}</div></Card>)}</div>
        <Card th={th} style={{marginBottom:16}}><div style={{fontSize:14,fontWeight:700,marginBottom:14}}>📋 Employee Compliance</div><div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10}}>{users.map(u=>{const a=audits.find(x=>x.userId===u.id);const sc=a?scoreAudit(a.checks):null;const risk=sc!==null?riskOf(sc):null;return<div key={u.id} style={{padding:"12px 14px",borderRadius:10,background:risk?RB[risk]:th.input,border:`1.5px solid ${risk?RC[risk]+"44":th.border}`}}><div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}><div><div style={{fontWeight:700,fontSize:13}}>{u.name}</div><div style={{fontSize:11,color:th.sub}}>{u.department}</div></div><div style={{fontSize:20,fontWeight:900,color:risk?RC[risk]:th.sub}}>{sc!==null?`${sc}%`:"—"}</div></div><div style={{marginTop:6,display:"flex",gap:6}}>{risk&&<Badge risk={risk}/>}{a&&<StatusPill status={a.status}/>}</div></div>;})} </div></Card>
        <div style={{display:"flex",gap:10}}><Btn th={th} onClick={exportCSV}>⬇️ Export CSV</Btn><Btn th={th} variant="secondary" onClick={()=>window.print()}>🖨️ Print / PDF</Btn></div>
      </>)}

      {tab==="activity"&&(
        <Card th={th}><div style={{fontSize:14,fontWeight:700,marginBottom:14}}>🕐 Activity Log</div>{activity.slice(0,40).map(a=>{const u=users.find(x=>x.id===a.userId);return<div key={a.id} style={{display:"flex",gap:12,padding:"9px 0",borderBottom:`1px solid ${th.border}`,alignItems:"center"}}><Avatar initials={u?.avatar||"?"} size={28} color="#6366f1"/><div style={{flex:1,fontSize:13}}><strong>{u?.name}</strong> <span style={{color:th.sub}}>{a.action}</span>{a.target?<> <strong>{a.target}</strong></>:null}</div><div style={{fontSize:11,color:th.sub,whiteSpace:"nowrap"}}>{fmtTime(a.timestamp)}</div></div>;})}{ activity.length===0&&<div style={{color:th.sub,textAlign:"center",padding:24}}>No activity yet.</div>}</Card>
      )}

      {selectedAudit&&(()=>{const emp=users.find(u=>u.id===selectedAudit.userId);const sc=scoreAudit(selectedAudit.checks);const risk=riskOf(sc);return<Modal th={th} title={`🔍 Audit Review — ${emp?.name}`} onClose={()=>{setSelectedAudit(null);setRejectReason("");}} width={540}><div style={{display:"flex",gap:12,marginBottom:14,alignItems:"center"}}><div style={{fontSize:28,fontWeight:900,color:RC[risk]}}>{sc}%</div><div style={{display:"flex",flexDirection:"column",gap:4}}><Badge risk={risk}/><StatusPill status={selectedAudit.status}/></div></div><div style={{fontSize:12,color:th.sub,marginBottom:14}}>{selectedAudit.deviceType} · {selectedAudit.deviceModel} · {selectedAudit.osVersion} · v{selectedAudit.version} · {fmt(selectedAudit.submittedAt)}</div>{SECURITY_CHECKS.map(c=>{const val=selectedAudit.checks[c.id];const ss=selectedAudit.screenshots?.[c.id];return<div key={c.id} style={{display:"flex",alignItems:"center",justifyContent:"space-between",padding:"8px 10px",borderRadius:8,marginBottom:6,background:val==="yes"?RB.secure:RB.danger}}><span style={{fontSize:13}}>{val==="yes"?"✅":"❌"} {c.label}</span>{ss?.dataUrl&&<img src={ss.dataUrl} alt="proof" style={{width:36,height:36,objectFit:"cover",borderRadius:6,cursor:"pointer"}} onClick={()=>window.open(ss.dataUrl)}/>}{ss&&!ss.dataUrl&&<span style={{fontSize:11,color:th.sub}}>📸 {ss.name}</span>}</div>;})} {selectedAudit.status==="pending_review"&&<div style={{marginTop:16}}><input value={rejectReason} onChange={e=>setRejectReason(e.target.value)} placeholder="Rejection reason (required to reject)…" style={{width:"100%",padding:"8px 12px",borderRadius:8,border:`1.5px solid ${th.border}`,background:th.input,color:th.text,fontSize:13,boxSizing:"border-box",marginBottom:10}}/><div style={{display:"flex",gap:10}}><Btn th={th} variant="success" onClick={()=>approveAudit(selectedAudit)}>✅ Approve</Btn><Btn th={th} variant="danger" onClick={()=>rejectAudit(selectedAudit)} disabled={!rejectReason.trim()}>❌ Reject</Btn></div></div>}{selectedAudit.rejectedReason&&<div style={{marginTop:12,background:RB.danger,borderRadius:8,padding:"10px 14px",fontSize:13,color:"#991b1b"}}>Rejected: {selectedAudit.rejectedReason}</div>}</Modal>;}  )()}
      {empModal&&<EmployeeModal th={th} mode={empModal.mode} employee={empModal.employee} onSave={saveEmployee} onClose={()=>setEmpModal(null)}/>}
      {bulkModal&&<BulkImportModal th={th} onImport={bulkImport} onClose={()=>setBulkModal(false)}/>}
      {deleteModal&&<DeleteModal th={th} employee={deleteModal} onConfirm={()=>deleteEmployee(deleteModal)} onClose={()=>setDeleteModal(null)}/>}
    </div>
  );
}

// ── APP ROOT ───────────────────────────────────────────────────────
function App() {
  const [user,setUser]=useState(null);
  const [darkMode,setDarkMode]=useState(false);
  const [users,setUsers]=useState([]);
  const [audits,setAudits]=useState([]);
  const [tasks,setTasks]=useState([]);
  const [activity,setActivity]=useState([]);
  const [notifications,setNotifications]=useState({});
  const [loading,setLoading]=useState(true);
  const [dbError,setDbError]=useState(null);
  const th=darkMode?dark:light;

  useEffect(()=>{ loadAll(); },[]);

  const loadAll=async()=>{
    setLoading(true); setDbError(null);
    try{
      const [u,a,t,act,n]=await Promise.all([
        db.from('users').select('*'),
        db.from('audits').select('*'),
        db.from('tasks').select('*'),
        db.from('activity').select('*').order('timestamp',{ascending:false}),
        db.from('notifications').select('*').order('time',{ascending:false}),
      ]);
      if(u.error) throw new Error(u.error.message);
      setUsers((u.data||[]).map(mapUser));
      setAudits((a.data||[]).map(mapAudit));
      setTasks((t.data||[]).map(mapTask));
      setActivity((act.data||[]).map(mapActiv));
      const notifMap={};
      (n.data||[]).forEach(r=>{ notifMap[r.user_id]=notifMap[r.user_id]||[]; notifMap[r.user_id].push({id:r.id,text:r.text,read:r.read,time:r.time}); });
      setNotifications(notifMap);
    }catch(err){
      setDbError(err.message);
    }
    setLoading(false);
  };

  if(loading) return (
    <div style={{minHeight:"100vh",background:"linear-gradient(135deg,#1e1b4b,#4f46e5)",display:"flex",alignItems:"center",justifyContent:"center",flexDirection:"column",gap:16}}>
      <div style={{fontSize:48}}>🔐</div>
      <div style={{color:"#fff",fontSize:18,fontWeight:700}}>Loading CyberAudit Portal…</div>
      <div style={{color:"#a5b4fc",fontSize:13}}>Connecting to database</div>
    </div>
  );

  if(dbError) return (
    <div style={{minHeight:"100vh",background:"#0f172a",display:"flex",alignItems:"center",justifyContent:"center",padding:20}}>
      <div style={{background:"#1e293b",borderRadius:16,padding:32,maxWidth:500,width:"100%"}}>
        <div style={{fontSize:36,marginBottom:12}}>⚠️</div>
        <div style={{color:"#f1f5f9",fontSize:18,fontWeight:700,marginBottom:8}}>Database Connection Error</div>
        <div style={{color:"#94a3b8",fontSize:13,marginBottom:16,background:"#0f172a",padding:"10px 14px",borderRadius:8,fontFamily:"monospace"}}>{dbError}</div>
        <div style={{color:"#64748b",fontSize:12,lineHeight:1.7,marginBottom:20}}>
          1. Make sure you ran <strong style={{color:"#a5b4fc"}}>supabase-setup.sql</strong> in your Supabase SQL Editor.<br/>
          2. Check that your Supabase project is active at <strong style={{color:"#a5b4fc"}}>supabase.com</strong>.<br/>
          3. The tables must exist: users, audits, tasks, activity, notifications.
        </div>
        <button onClick={loadAll} style={{background:"#6366f1",color:"#fff",border:"none",borderRadius:8,padding:"10px 24px",fontSize:14,fontWeight:700,cursor:"pointer"}}>🔄 Retry Connection</button>
      </div>
    </div>
  );

  if(!user) return <Login onLogin={setUser} users={users}/>;
  return (
    <div style={{minHeight:"100vh",background:th.bg,fontFamily:"system-ui,sans-serif"}}>
      <div style={{background:th.nav,padding:"12px 20px",display:"flex",alignItems:"center",justifyContent:"space-between",position:"sticky",top:0,zIndex:50,boxShadow:"0 2px 8px #0003"}}>
        <div style={{color:"#fff",fontWeight:800,fontSize:15,display:"flex",alignItems:"center",gap:8}}>🔐 CyberAudit <span style={{background:"#312e81",color:"#a5b4fc",fontSize:10,padding:"2px 8px",borderRadius:99,fontWeight:700}}>PORTAL</span></div>
        <div style={{display:"flex",alignItems:"center",gap:10}}>
          <span style={{color:"#a5b4fc",fontSize:12}}>{user.name}</span>
          <span style={{background:user.role==="admin"?"#6366f1":"#22c55e",color:"#fff",fontSize:10,padding:"2px 8px",borderRadius:99,fontWeight:700,textTransform:"uppercase"}}>{user.role}</span>
          <button onClick={()=>setDarkMode(d=>!d)} style={{background:"transparent",border:"1px solid #334155",borderRadius:8,padding:"5px 10px",cursor:"pointer",color:"#a5b4fc",fontSize:14}}>{darkMode?"☀️":"🌙"}</button>
          <button onClick={()=>setUser(null)} style={{background:"#312e81",color:"#c7d2fe",border:"none",borderRadius:8,padding:"6px 12px",fontSize:12,cursor:"pointer",fontWeight:600}}>Sign Out</button>
        </div>
      </div>
      {user.role==="admin"
        ?<AdminDashboard user={user} users={users} setUsers={setUsers} audits={audits} setAudits={setAudits} tasks={tasks} setTasks={setTasks} activity={activity} setActivity={setActivity} notifications={notifications} setNotifications={setNotifications} th={th}/>
        :<EmployeeDashboard user={user} audits={audits} setAudits={setAudits} tasks={tasks} setTasks={setTasks} setActivity={setActivity} notifications={notifications} setNotifications={setNotifications} th={th}/>
      }
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
